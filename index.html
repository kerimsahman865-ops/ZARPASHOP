<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZARPA SHOP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        nav { position: fixed; top: 0; width: 100%; padding: 1.5rem; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; cursor: pointer; }
        .admin-btn { display: none; background: #fff; color: #000; border: none; padding: 8px 15px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; }
        .hero { padding: 120px 20px 40px; text-align: center; background: radial-gradient(circle, #111 0%, #000 100%); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; cursor: pointer; transition: 0.3s; position: relative; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .card h3 { font-size: 1.1rem; margin: 10px 0 5px; text-transform: uppercase; }
        .price { font-weight: 700; color: #fff; font-size: 1.5rem; margin-bottom: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 450px; margin: 40px auto; background: #000; padding: 30px; border: 1px solid #333; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: #111; border: 1px solid #222; color: #fff; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="adminLogin()">ZARPA SHOP</div>
    <button id="addBtn" class="admin-btn" onclick="toggleModal('adminModal')">+ DODAJ ARTIKAL</button>
</nav>

<div class="hero">
    <h1 style="text-transform: uppercase;">Premium Wear</h1>
</div>

<div class="container">
    <div class="grid" id="productGrid">Učitavanje...</div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="toggleModal('adminModal')">&times;</span>
        <h2>NOVI ARTIKAL</h2>
        <input type="text" id="pName" placeholder="Naziv artikla">
        <input type="text" id="pPrice" placeholder="Cena">
        <input type="text" id="pImg" placeholder="Link slike (sa Postimg)">
        <button class="submit-btn" onclick="saveToCloud()">SAČUVAJ DA SVI VIDE</button>
    </div>
</div>

<script>
    // TVOJI PODACI SA SNIMKA
    const S_URL = 'https://qwzzjiuogqpqfumgaxsl.supabase.co';
    const S_KEY = 'sb_publishable_10N7PU1uiJu20FozwK9roQ_0JqHg_REDACTED'; // Prepisan tvoj ključ
    const _supabase = supabase.createClient(S_URL, S_KEY);

    let isAdmin = false;

    function adminLogin() {
        if(prompt("Lozinka:") === "zarpa123") {
            isAdmin = true;
            document.getElementById('addBtn').style.display = 'block';
            render();
        }
    }

    async function saveToCloud() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;

        if(!name || !price || !img) return alert("Popuni sve!");

        let { data: res } = await _supabase.from('shop').select('data').eq('id', 1).single();
        let items = res ? res.data : [];
        items.push({ name, price, img });

        const { error } = await _supabase.from('shop').update({ data: items }).eq('id', 1);
        
        if(error) alert("Greška! Proveri SQL tabelu.");
        else location.reload();
    }

    async function render() {
        const grid = document.getElementById('productGrid');
        let { data } = await _supabase.from('shop').select('data').eq('id', 1).single();
        
        if(data && data.data) {
            grid.innerHTML = data.data.map(item => `
                <div class="card">
                    <img src="${item.img}">
                    <h3>${item.name}</h3>
                    <div class="price">${item.price}</div>
                    <button class="submit-btn" style="padding:10px; font-size:0.8rem;">NARUČI</button>
                </div>
            `).join('');
        }
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    render();
</script>
</body>
</html>
