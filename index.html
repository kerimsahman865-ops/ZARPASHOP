<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZARPA SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; }
        nav { padding: 1.5rem; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: 3px; cursor: pointer; }
        .admin-btn { display: none; background: #fff; color: #000; border: none; padding: 10px 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 15px; text-align: center; position: relative; }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #fff; margin-bottom: 15px; }
        .price { font-size: 1.5rem; font-weight: 900; margin-bottom: 15px; }
        .btn-order { width: 100%; padding: 12px; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: red; color: #fff; border: none; padding: 5px 10px; cursor: pointer; display: none; }
        
        #copyPanel { display: none; background: #111; padding: 20px; border: 2px dashed #fff; margin-top: 40px; text-align: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; padding: 20px; }
        .modal-content { max-width: 400px; margin: 50px auto; background: #000; padding: 30px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; background: #111; border: 1px solid #222; color: #fff; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="adminLogin()">ZARPA SHOP</div>
    <button id="addBtn" class="admin-btn" onclick="toggleModal('adminModal')">+ DODAJ ARTIKAL</button>
</nav>

<div class="container">
    <div class="grid" id="mainShop">
        </div>

    <div id="copyPanel">
        <p style="margin-bottom: 15px; color: #888;">Nakon što dodaš ili obrišeš artikle, klikni dugme ispod:</p>
        <button class="btn-order" onclick="copyFullCode()" style="background: lime;">KOPIRAJ CEO KOD ZA GITHUB</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h2>NOVI ARTIKAL</h2>
        <input type="text" id="pName" placeholder="Naziv">
        <input type="text" id="pPrice" placeholder="Cena">
        <input type="text" id="pImg" placeholder="Link slike">
        <button class="btn-order" onclick="addNewItem()">Dodaj na listu</button>
        <button class="btn-order" onclick="toggleModal('adminModal')" style="margin-top:10px; background: #333; color: #fff;">Zatvori</button>
    </div>
</div>

<script id="dataScript">
    // --- OVDE SE ČUVAJU TVOJI ARTIKLI ---
    const savedItems = []; 
    // -----------------------------------

    let isAdmin = false;

    function adminLogin() {
        if(prompt("Lozinka:") === "zarpa123") {
            isAdmin = true;
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('copyPanel').style.display = 'block';
            render();
        }
    }

    function addNewItem() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        if(!name || !price || !img) return alert("Popuni sve!");
        
        savedItems.push({ name, price, img });
        toggleModal('adminModal');
        render();
    }

    function deleteItem(index) {
        if(confirm("Obriši?")) {
            savedItems.splice(index, 1);
            render();
        }
    }

    function render() {
        const shop = document.getElementById('mainShop');
        shop.innerHTML = savedItems.map((item, i) => `
            <div class="card">
                <button class="del-btn" style="display: ${isAdmin ? 'block' : 'none'}" onclick="deleteItem(${i})">X</button>
                <img src="${item.img}">
                <h3>${item.name}</h3>
                <div class="price">${item.price}</div>
                <button class="btn-order">NARUČI</button>
            </div>
        `).join('');
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function copyFullCode() {
        let currentContent = document.documentElement.outerHTML;
        let dataString = JSON.stringify(savedItems);
        let finalCode = currentContent.replace(/const savedItems = \[.*?\];/, `const savedItems = ${dataString};`);
        
        navigator.clipboard.writeText(finalCode).then(() => {
            alert("KOD KOPIRAN! Sada idi na GitHub, uđi u index.html, obriši sve i nalepi ovo.");
        });
    }

    render();
</script>
</body>
</html>
